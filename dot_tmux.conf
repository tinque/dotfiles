# ── Prefix ──────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Terminal & Colors ───────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g focus-events on

# ── Extended keys (pass Shift+Enter etc. to apps) ──────
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ── General ─────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g display-time 2000

# ── Splits (AZERTY friendly) ───────────────────────────
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Navigation (vim style) ─────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize (repeatable) ────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Sessions ────────────────────────────────────────────
bind S choose-tree -s

# ── Windows ─────────────────────────────────────────────
bind x kill-pane
bind & kill-window
bind , command-prompt "rename-window '%%'"

# ── Copy mode (vi) ─────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel
bind P paste-buffer
bind p previous-window
bind n next-window

# ── Reload ──────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── Status bar ──────────────────────────────────────────
set -g status-position top
set -g status-interval 5
set -g status-style "bg=default,fg=#888888"

set -g status-left-length 40
set -g status-left "#[fg=#c6a0f6,bold]#{session_name} #[fg=#555555]│ "

set -g status-right-length 60
set -g status-right "#[fg=#555555]│ #[fg=#a6da95]%H:%M #[fg=#555555]│ #[fg=#8aadf4]%a %d %b"

setw -g window-status-format "#[fg=#555555] #I:#W "
setw -g window-status-current-format "#[fg=#c6a0f6,bold] #I:#W "
setw -g window-status-separator ""

set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#c6a0f6"

set -g message-style "bg=default,fg=#c6a0f6"

# ── Plugins ─────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

run '~/.tmux/plugins/tpm/tpm'
