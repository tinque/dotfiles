# ===== PREFIX =====
# Use Ctrl+a instead of Ctrl+b (faster to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ===== GENERAL =====
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1

# ===== SPLITS (AZERTY friendly) =====
# Avoid | which is painful on AZERTY
bind v split-window -h   # vertical split
bind s split-window -v   # horizontal split

# ===== NAVIGATION (VIM STYLE) =====
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ===== RESIZE (hold key) =====
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ===== WINDOWS =====
bind c new-window
bind x kill-pane
bind & kill-window

# ===== RENAME =====
bind , command-prompt "rename-window %%"

# ===== RELOAD CONFIG =====
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ===== STATUS BAR (CLEAN + STYLISH) =====
set -g status-bg black
set -g status-fg white
set -g status-left "#[fg=green]#S "
set -g status-right "#[fg=yellow]%H:%M #[fg=cyan]%d-%m-%Y"

# Active window highlight
setw -g window-status-current-style fg=black,bg=green,bold

# ===== COLORS =====
set -g default-terminal "screen-256color"
set -g xterm-keys on
set-option -g focus-events on
